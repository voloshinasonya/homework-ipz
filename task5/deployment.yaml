apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-backend
spec:
  replicas: 4
  selector:
    matchLabels:
      app: my-backend
  template:
    metadata:
      labels:
        app: my-backend
    spec:
      containers:
      - name: my-backend
        image: voloshinasonya/python-backend:1.0.1
        ports:
        - containerPort: 5000